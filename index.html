<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 Movie Rating Normalizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      color: #f1f1f1;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
      background: linear-gradient(180deg, #1a0533 0%, #080810 100%);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(245,197,24,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f5c518, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: #888;
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    /* TABS */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 22px;
      border-radius: 50px;
      border: 1px solid #2a2a2a;
      background: #111118;
      color: #777;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .tab:hover { border-color: #f5c518; color: #f5c518; }
    .tab.active {
      background: linear-gradient(135deg, #f5c518, #ff9500);
      color: #000;
      border-color: transparent;
    }

    /* SEARCH */
    .search-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px 20px 20px;
      flex-wrap: wrap;
    }

    .search-box input {
      padding: 14px 22px;
      width: 380px;
      border-radius: 50px;
      border: 1px solid #2a2a2a;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: #111118;
      color: #fff;
      outline: none;
      transition: border 0.3s;
    }

    .search-box input:focus { border-color: #f5c518; }

    .search-box button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #f5c518, #ff9500);
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .search-box button:hover { opacity: 0.9; transform: scale(1.03); }

    /* FILTERS */
    .filters {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 0 20px 20px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.85rem;
      color: #777;
    }

    .filters select {
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid #2a2a2a;
      background: #111118;
      color: #fff;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .filters select:focus { border-color: #f5c518; }

    /* RESULTS COUNT */
    .results-count {
      text-align: center;
      color: #555;
      font-size: 0.85rem;
      padding-bottom: 16px;
    }

    /* RESULTS */
    #results {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 0 20px 60px;
    }

    /* CARD */
    .card {
      background: #111118;
      border-radius: 16px;
      width: 240px;
      overflow: hidden;
      border: 1px solid #1e1e2e;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(245,197,24,0.15);
      border-color: #f5c518;
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .no-poster {
      width: 100%;
      height: 320px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-body { padding: 18px; }

    .card-body h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .year { font-size: 0.8rem; color: #555; margin-bottom: 14px; }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .score-label { font-size: 0.72rem; color: #777; }
    .score-value { font-size: 0.72rem; color: #f5c518; font-weight: 600; }

    .score-bar-bg {
      background: #1e1e2e;
      border-radius: 999px;
      height: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .score-bar {
      height: 5px;
      border-radius: 999px;
      width: 0%;
      transition: width 1s ease;
    }

    .bar-tmdb { background: linear-gradient(90deg, #f5c518, #ff9500); }
    .bar-popularity { background: linear-gradient(90deg, #38bdf8, #6366f1); }
    .bar-votes { background: linear-gradient(90deg, #34d399, #10b981); }

    .divider { border: none; border-top: 1px solid #1e1e2e; margin: 14px 0; }

    .unified-score {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f5c518, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .unified-label { text-align: center; font-size: 0.72rem; color: #555; margin-top: 2px; margin-bottom: 10px; }

    .badge {
      display: block;
      text-align: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .badge-great { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid #34d399; }
    .badge-good { background: rgba(245,197,24,0.15); color: #f5c518; border: 1px solid #f5c518; }
    .badge-average { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid #fb923c; }
    .badge-poor { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid #f87171; }

    .loading { text-align: center; color: #f5c518; font-size: 1.1rem; padding: 60px; width: 100%; }
    .error { text-align: center; color: #f87171; font-size: 1rem; padding: 60px; width: 100%; }

    /* ACTOR CARD */
    .actor-card {
      background: #111118;
      border-radius: 16px;
      width: 160px;
      overflow: hidden;
      border: 1px solid #1e1e2e;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }

    .actor-card:hover {
      border-color: #f5c518;
      transform: translateY(-5px);
    }

    .actor-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .actor-card .actor-name {
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
    }

    .actor-card .actor-known {
      padding: 0 12px 12px;
      font-size: 0.75rem;
      color: #777;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #111118;
      border-radius: 20px;
      width: 100%;
      max-width: 620px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
      border: 1px solid #1e1e2e;
      box-shadow: 0 0 60px rgba(245,197,24,0.1);
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      font-size: 1.3rem;
      cursor: pointer;
      color: #555;
      background: #1e1e2e;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .modal-close:hover { color: #fff; }

    .modal-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .modal-header img {
      width: 110px;
      height: 160px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .modal-header h2 { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .modal-meta { font-size: 0.82rem; color: #f5c518; margin-bottom: 8px; }
    .modal-genre { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
    .modal-overview { font-size: 0.82rem; color: #aaa; line-height: 1.7; }
    .modal-scores h3 { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 16px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #1e1e2e;
      font-size: 0.85rem;
    }

    .stat-row span:first-child { color: #777; }
    .stat-row span:last-child { color: #fff; font-weight: 600; }

    @media (max-width: 600px) {
      header h1 { font-size: 2rem; }
      .search-box { flex-direction: column; align-items: center; }
      .search-box input { width: 100%; max-width: 350px; }
      .modal-header { flex-direction: column; }
      .modal-header img { width: 100%; height: 200px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>🎬 Movie Rating Normalizer</h1>
    <p>Search movies · filter by genre · sort by score · find by actor</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('movie')">🎬 Search Movie</button>
    <button class="tab" onclick="switchTab('actor')">🎭 Search by Actor</button>
  </div>

  <!-- SEARCH BOX -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search a movie e.g Inception, Avatar..." />
    <button id="searchBtn" onclick="handleSearch()">Search</button>
  </div>

  <!-- FILTERS (only for movie search) -->
  <div class="filters" id="filtersRow">
    <span class="filter-label">🎭 Genre:</span>
    <select id="genreFilter" onchange="applyFilters()">
      <option value="">All Genres</option>
      <option value="28">Action</option>
      <option value="35">Comedy</option>
      <option value="18">Drama</option>
      <option value="27">Horror</option>
      <option value="10749">Romance</option>
      <option value="878">Sci-Fi</option>
      <option value="16">Animation</option>
      <option value="80">Crime</option>
      <option value="99">Documentary</option>
      <option value="14">Fantasy</option>
    </select>

    <span class="filter-label">📊 Sort:</span>
    <select id="sortFilter" onchange="applyFilters()">
      <option value="unified">Unified Score</option>
      <option value="tmdb">TMDB Score</option>
      <option value="popularity">Popularity</option>
      <option value="year">Newest First</option>
    </select>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div id="results"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_KEY = "284f6c13aee8330880a99a26988f0f42";
    let currentTab = "movie";
    let allMovies = [];

    // TAB SWITCHING
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      event.target.classList.add("active");

      const input = document.getElementById("searchInput");
      const filters = document.getElementById("filtersRow");

      if (tab === "movie") {
        input.placeholder = "Search a movie e.g Inception, Avatar...";
        filters.style.display = "flex";
      } else {
        input.placeholder = "Search an actor e.g Leonardo DiCaprio...";
        filters.style.display = "none";
      }

      document.getElementById("results").innerHTML = "";
      document.getElementById("resultsCount").textContent = "";
      input.value = "";
    }

    document.getElementById("searchInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleSearch();
    });

    function handleSearch() {
      if (currentTab === "movie") searchMovies();
      else searchByActor();
    }

    // SEARCH MOVIES
    async function searchMovies() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = `<div class="loading">🔍 Searching movies...</div>`;
      document.getElementById("resultsCount").textContent = "";

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&page=1`
        );
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = `<div class="error">No movies found. Try another title.</div>`;
          return;
        }

        allMovies = data.results.slice(0, 12);
        applyFilters();

      } catch (err) {
        resultsDiv.innerHTML = `<div class="error">Something went wrong. Check your API key.</div>`;
      }
    }

    // APPLY FILTERS AND SORT
    function applyFilters() {
      const genreFilter = document.getElementById("genreFilter").value;
      const sortFilter = document.getElementById("sortFilter").value;

      let filtered = [...allMovies];

      // Filter by genre
      if (genreFilter) {
        filtered = filtered.filter(m =>
          m.genre_ids && m.genre_ids.includes(parseInt(genreFilter))
        );
      }

      // Sort
      filtered.sort((a, b) => {
        if (sortFilter === "unified") return getUnifiedScore(b) - getUnifiedScore(a);
        if (sortFilter === "tmdb") return (b.vote_average || 0) - (a.vote_average || 0);
        if (sortFilter === "popularity") return (b.popularity || 0) - (a.popularity || 0);
        if (sortFilter === "year") {
          return new Date(b.release_date || 0) - new Date(a.release_date || 0);
        }
        return 0;
      });

      const resultsDiv = document.getElementById("results");
      const countDiv = document.getElementById("resultsCount");

      if (filtered.length === 0) {
        resultsDiv.innerHTML = `<div class="error">No movies match this genre filter.</div>`;
        countDiv.textContent = "";
        return;
      }

      countDiv.textContent = `Showing ${filtered.length} result${filtered.length > 1 ? "s" : ""}`;
      resultsDiv.innerHTML = "";

      for (const movie of filtered) {
        const card = buildCard(movie);
        resultsDiv.appendChild(card);
      }

      setTimeout(() => {
        document.querySelectorAll(".score-bar").forEach(bar => {
          bar.style.width = bar.dataset.width + "%";
        });
      }, 100);
    }

    // SEARCH BY ACTOR
    async function searchByActor() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = `<div class="loading">🔍 Searching actors...</div>`;

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(query)}`
        );
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = `<div class="error">No actors found. Try another name.</div>`;
          return;
        }

        const actors = data.results.slice(0, 6);
        resultsDiv.innerHTML = "";

        // Show actor cards
        for (const actor of actors) {
          const card = buildActorCard(actor);
          resultsDiv.appendChild(card);
        }

      } catch (err) {
        resultsDiv.innerHTML = `<div class="error">Something went wrong.</div>`;
      }
    }

    // LOAD MOVIES BY ACTOR
    async function loadActorMovies(actorId, actorName) {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = `<div class="loading">🎬 Loading ${actorName}'s movies...</div>`;
      document.getElementById("resultsCount").textContent = "";

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/person/${actorId}/movie_credits?api_key=${API_KEY}`
        );
        const data = await res.json();

        const movies = data.cast
          ?.filter(m => m.vote_count > 100)
          .sort((a, b) => (b.vote_average || 0) - (a.vote_average || 0))
          .slice(0, 12) || [];

        if (movies.length === 0) {
          resultsDiv.innerHTML = `<div class="error">No movies found for this actor.</div>`;
          return;
        }

        document.getElementById("resultsCount").textContent =
          `🎭 Showing top ${movies.length} movies for ${actorName}`;

        resultsDiv.innerHTML = "";
        for (const movie of movies) {
          const card = buildCard(movie);
          resultsDiv.appendChild(card);
        }

        setTimeout(() => {
          document.querySelectorAll(".score-bar").forEach(bar => {
            bar.style.width = bar.dataset.width + "%";
          });
        }, 100);

      } catch (err) {
        resultsDiv.innerHTML = `<div class="error">Could not load movies.</div>`;
      }
    }

    // NORMALIZATION
    function normalizePopularity(popularity) {
      return Math.min((popularity / 500) * 10, 10);
    }

    function normalizeVoteCount(voteCount) {
      return Math.min((voteCount / 50000) * 10, 10);
    }

    function getUnifiedScore(movie) {
      const tmdb = movie.vote_average || 0;
      const popularity = normalizePopularity(movie.popularity || 0);
      const votes = normalizeVoteCount(movie.vote_count || 0);
      return parseFloat(((tmdb * 0.6) + (popularity * 0.2) + (votes * 0.2)).toFixed(1));
    }

    function getBadge(score) {
      if (score >= 8) return { text: "🏆 Great", cls: "badge-great" };
      if (score >= 6) return { text: "👍 Good", cls: "badge-good" };
      if (score >= 4) return { text: "😐 Average", cls: "badge-average" };
      return { text: "👎 Poor", cls: "badge-poor" };
    }

    // BUILD MOVIE CARD
    function buildCard(movie) {
      const tmdbScore = movie.vote_average || 0;
      const popularity = normalizePopularity(movie.popularity || 0);
      const votes = normalizeVoteCount(movie.vote_count || 0);
      const unified = getUnifiedScore(movie);
      const badge = getBadge(unified);

      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => openModal(movie);

      const poster = movie.poster_path
        ? `<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" />`
        : `<div class="no-poster">🎬</div>`;

      const year = movie.release_date ? movie.release_date.split("-")[0] : "Unknown";

      card.innerHTML = `
        ${poster}
        <div class="card-body">
          <h3>${movie.title}</h3>
          <div class="year">${year}</div>
          <div class="score-row">
            <span class="score-label">⭐ TMDB Score</span>
            <span class="score-value">${tmdbScore.toFixed(1)}/10</span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar bar-tmdb" data-width="${(tmdbScore/10)*100}" style="width:0%"></div>
          </div>
          <div class="score-row">
            <span class="score-label">🔥 Popularity</span>
            <span class="score-value">${popularity.toFixed(1)}/10</span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar bar-popularity" data-width="${(popularity/10)*100}" style="width:0%"></div>
          </div>
          <div class="score-row">
            <span class="score-label">🗳️ Vote Confidence</span>
            <span class="score-value">${votes.toFixed(1)}/10</span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar bar-votes" data-width="${(votes/10)*100}" style="width:0%"></div>
          </div>
          <hr class="divider">
          <div class="unified-score">${unified}/10</div>
          <div class="unified-label">⭐ Unified Score</div>
          <span class="badge ${badge.cls}">${badge.text}</span>
        </div>
      `;

      return card;
    }

    // BUILD ACTOR CARD
    function buildActorCard(actor) {
      const card = document.createElement("div");
      card.className = "actor-card";
      card.onclick = () => loadActorMovies(actor.id, actor.name);

      const photo = actor.profile_path
        ? `<img src="https://image.tmdb.org/t/p/w200${actor.profile_path}" alt="${actor.name}" />`
        : `<div style="width:100%;height:200px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:3rem">🎭</div>`;

      card.innerHTML = `
        ${photo}
        <div class="actor-name">${actor.name}</div>
        <div class="actor-known">${actor.known_for_department || "Acting"}</div>
      `;

      return card;
    }

    // MODAL
    async function openModal(movie) {
      const overlay = document.getElementById("modalOverlay");
      const body = document.getElementById("modalBody");
      overlay.classList.add("active");
      body.innerHTML = `<div class="loading">Loading details...</div>`;

      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/movie/${movie.id}?api_key=${API_KEY}`
        );
        const d = await res.json();

        const unified = getUnifiedScore(movie);
        const badge = getBadge(unified);
        const genres = d.genres?.map(g => g.name).join(", ") || "N/A";
        const runtime = d.runtime ? `${d.runtime} min` : "N/A";

        body.innerHTML = `
          <div class="modal-header">
            ${movie.poster_path
              ? `<img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" />`
              : `<div style="width:110px;height:160px;background:#1a1a2e;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0">🎬</div>`
            }
            <div>
              <h2>${d.title}</h2>
              <div class="modal-meta">${d.release_date?.split("-")[0]} · ${runtime}</div>
              <div class="modal-genre">${genres}</div>
              <div class="modal-overview">${d.overview || "No description available."}</div>
            </div>
          </div>
          <div class="modal-scores">
            <h3>📊 Rating Breakdown</h3>
            <div class="stat-row"><span>⭐ TMDB Score</span><span>${d.vote_average?.toFixed(1)}/10</span></div>
            <div class="stat-row"><span>🗳️ Total Votes</span><span>${d.vote_count?.toLocaleString()}</span></div>
            <div class="stat-row"><span>🔥 Popularity Index</span><span>${d.popularity?.toFixed(1)}</span></div>
            <div class="stat-row"><span>💰 Budget</span><span>${d.budget ? "$" + d.budget.toLocaleString() : "N/A"}</span></div>
            <div class="stat-row"><span>💵 Revenue</span><span>${d.revenue ? "$" + d.revenue.toLocaleString() : "N/A"}</span></div>
            <hr class="divider">
            <div class="unified-score">${unified}/10</div>
            <div class="unified-label">⭐ Unified Score</div>
            <span class="badge ${badge.cls}" style="margin-top:10px">${badge.text}</span>
          </div>
        `;
      } catch (err) {
        body.innerHTML = `<div class="error">Could not load details.</div>`;
      }
    }

    function closeModal(event) {
      if (event.target === document.getElementById("modalOverlay")) {
        document.getElementById("modalOverlay").classList.remove("active");
      }
    }

    function closeModalDirect() {
      document.getElementById("modalOverlay").classList.remove("active");
    }
  </script>

</body>
</html>
